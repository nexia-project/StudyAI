[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@9 && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["BASE_PATH=/ pnpm --filter @workspace/studyai run build && pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
